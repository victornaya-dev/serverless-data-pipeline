<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rain Forecast</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f0;
      --card: #ffffff;
      --border: #e0e4e0;
      --text: #1a1f1a;
      --muted: #6b7a6b;
      --accent: #2d5a3d;
      --accent-light: #eaf2ec;
      --rain: #1e3a5f;
      --rain-light: #e8eef5;
      --sun: #2d5a3d;
      --sun-light: #eaf2ec;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
    }

    .header {
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .header p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--mono);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      font-size: 15px;
      font-family: var(--mono);
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .field input::placeholder {
      color: #bbc4bb;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-family: var(--mono);
      font-weight: 500;
      color: #fff;
      background: var(--text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .spinner::before {
      content: '';
      display: block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      margin: 0 auto 8px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      display: none;
      margin-top: 1rem;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 13px;
      font-family: var(--mono);
      color: #b91c1c;
    }

    .result {
      display: none;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .result-badge.rain {
      background: var(--rain-light);
      color: var(--rain);
    }

    .result-badge.sun {
      background: var(--sun-light);
      color: var(--sun);
    }

    .result-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .result-badge.rain .dot { background: var(--rain); }
    .result-badge.sun .dot { background: var(--sun); }

    .result-main {
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .result-sub {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .feat {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .feat-key {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .feat-val {
      font-size: 15px;
      font-family: var(--mono);
      font-weight: 500;
      color: var(--text);
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Rain<br>forecast</h1>
    <p>Enter coordinates to check tomorrow's rain prediction</p>
  </div>

  <div class="card">
    <div class="field">
      <label>Latitude</label>
      <input type="number" id="lat" placeholder="48.8566" step="any" />
    </div>
    <div class="field">
      <label>Longitude</label>
      <input type="number" id="lon" placeholder="2.3522" step="any" />
    </div>

    <button id="btn" onclick="predict()">Run forecast</button>

    <div class="spinner" id="spinner">Fetching data...</div>
    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-badge" id="badge">
        <span class="dot"></span>
        <span id="badge-text"></span>
      </div>
      <p class="result-main" id="result-main"></p>
      <p class="result-sub" id="result-sub"></p>
      <div class="features" id="features"></div>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://mun9h4frh4.execute-api.***REMOVED***.amazonaws.com/predict";

  const LABEL_MAP = {
    temp_mean: "Temp mean (°C)",
    temp_max: "Temp max (°C)",
    humidity_mean: "Humidity mean (%)",
    humidity_max: "Humidity max (%)",
    cloudcover_mean: "Cloud cover (%)",
    precip_total: "Precip total (mm)",
    current_temp: "Current temp (°C)"
  };

  async function predict() {
    const lat = parseFloat(document.getElementById("lat").value);
    const lon = parseFloat(document.getElementById("lon").value);
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");
    const errorEl = document.getElementById("error");
    const resultEl = document.getElementById("result");

    errorEl.style.display = "none";
    resultEl.style.display = "none";

    if (isNaN(lat) || isNaN(lon)) {
      errorEl.textContent = "Please enter valid lat/lon values.";
      errorEl.style.display = "block";
      return;
    }

    btn.disabled = true;
    spinner.style.display = "block";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lat, lon })
      });

      const data = await res.json();
      const body = typeof data.body === "string" ? JSON.parse(data.body) : data.body;
      const pred = body.prediction;
      const feats = body.features_used;

      const willRain = pred.rain_tomorrow;

      const badge = document.getElementById("badge");
      badge.className = "result-badge " + (willRain ? "rain" : "sun");
      document.getElementById("badge-text").textContent = willRain ? "Rain expected" : "No rain expected";
      document.getElementById("result-main").textContent = willRain
        ? "It will likely rain tomorrow."
        : "Tomorrow looks clear.";
      document.getElementById("result-sub").textContent =
        "Score: " + pred.score.toFixed(2) + "  ·  " + pred.reason.replace(/_/g, " ");

      const featuresEl = document.getElementById("features");
      featuresEl.innerHTML = Object.entries(feats).map(([k, v]) =>
        `<div class="feat">
          <div class="feat-key">${LABEL_MAP[k] || k.replace(/_/g, " ")}</div>
          <div class="feat-val">${typeof v === "number" ? v.toFixed(1) : v}</div>
        </div>`
      ).join("");

      resultEl.style.display = "block";

    } catch (err) {
      errorEl.textContent = "API error: " + err.message;
      errorEl.style.display = "block";
    } finally {
      btn.disabled = false;
      spinner.style.display = "none";
    }
  }
</script>
</body>
</html>
